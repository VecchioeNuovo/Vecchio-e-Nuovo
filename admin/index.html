<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Pannello di Controllo - Vecchio & Nuovo</title>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    if (window.identityWidget) {
      window.identityWidget.on("init", user => {
        if (!user) {
          window.identityWidget.on("login", () => {
            document.location.href = "/Vecchio-e-Nuovo/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
