<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Pannello di Controllo — Vecchio & Nuovo</title>
</head>
<body>
  <!-- 1. Widget autenticazione Netlify con URL esplicito -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    // Dice al widget dove trovare il server Identity
    // DEVE girare prima che Decap CMS si carichi
    document.addEventListener("DOMContentLoaded", function() {
      if (window.netlifyIdentity) {
        window.netlifyIdentity.init({
          APIUrl: "https://vecchioenuovo.netlify.app/.netlify/identity"
        });
      }
    });
  </script>

  <!-- 2. Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <!-- 3. Redirect dopo login -->
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/Vecchio-e-Nuovo/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
